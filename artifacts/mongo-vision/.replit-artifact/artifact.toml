kind = "web"
previewPath = "/"
title = "MongoVision"
version = "1.0.0"
id = "artifacts/mongo-vision"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18540

[services.development]
run = "pnpm --filter @workspace/mongo-vision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mongo-vision", "run", "build" ]
publicDir = "artifacts/mongo-vision/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18540"
BASE_PATH = "/"
